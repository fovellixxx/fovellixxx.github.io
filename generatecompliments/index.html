<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор комплиментов</title>
    <script src="./script.js" defer></script> 
</head>
<body>
    <div class="game-container">

        <h1>😊 Генератор комплиментов 😊</h1>

        <p class="subtitle">Создай хорошее настроение себе и друзьям!</p>

        <div class="input-section">
            <input id="nameInput" onkeypress="handleKeyPress(event)" placeholder="Как тебя зовут?">
            <button onclick="setName()">✨ Сохранить имя</button>
        </div>
        <div class="category-buttons">
            <button id="general" class="category active" onclick="setCategory('general')">🌟 Общие</button>
            <button id="smart" class="category" onclick="setCategory('smart')">🧠 Умные</button>
            <button id="creative" class="category" onclick="setCategory('creative')">🎨 Творческие</button>
            <button id="kind" class="category" onclick="setCategory('kind')">💝 Добрые</button>
        </div>

        <button class="compliment-button" onclick="generateCompliment()">🎁 Получить комплимент!</button>

        <div id="complimentDisplay" class="compliment-display">Нажми на кнопку, чтобы получить свой первый комплимент! 🌈</div>

        <div class="stats">

            <div class="stat-card">
                <div id="totalCount" class="stat-number">0</div>
                <div class="stat-label">Всего комплиментов</div>
            </div>

            <div class="stat-card">
                <div id='categoryCount' class='stat-number'>0</div>
                <div class="stat-label">В этой категории</div>
            </div>

        </div>
        <div class="controls">
            <button onclick='addToFavorites()'>⭐ Добавить в избранное</button>
        </div>
        <div class="favorites">
        <h4>❤️ Твои любимые комплименты:</h4>
        <div id="favoritesList">Пока нет избранных комплиментов</div>
        <button onclick="resetStats()">resetStats</button>
      </div>
    </div>

</body>
</html>
